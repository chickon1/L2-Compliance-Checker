name: Release

# Builds the Linux binary and (only for an actual version tag) publishes it
# as a GitHub Release. Windows packaging (WiX-built .msi, SignPath signing)
# was tried and works up to the point of needing a completed SignPath
# Foundation application — see git history around the "Switch Windows
# packaging to a signed MSI" commit if picking that back up later. For now
# this only builds/ships Linux; see packaging/README.md for building the
# Windows desktop app by hand in the meantime.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {} # manual smoke-test run: builds the artifact, does NOT publish a Release

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install desktop dependencies
        run: pip install -e ".[desktop]"

      - name: Build the binary
        run: pyinstaller packaging/compliance-checker.spec

      - name: Package as tarball
        run: tar -C dist -czf compliance-checker-linux-x86_64.tar.gz compliance-checker

      - uses: actions/upload-artifact@v7
        with:
          name: linux-binary
          path: compliance-checker-linux-x86_64.tar.gz

  release:
    needs: [build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create the Release and attach files with the default GITHUB_TOKEN
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: linux-binary
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/compliance-checker-linux-x86_64.tar.gz
